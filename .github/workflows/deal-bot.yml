name: Amazon Deal Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: amazon-deal-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore seen deals cache
        uses: actions/cache/restore@v4
        with:
          path: data/seen_deals.json
          key: seen-deals-${{ github.run_id }}
          restore-keys: |
            seen-deals-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run deal bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MAX_PRICE_DOLLARS: ${{ vars.MAX_PRICE_DOLLARS }}
          MIN_SCORE_TO_NOTIFY: ${{ vars.MIN_SCORE_TO_NOTIFY }}
          MAX_ALERTS_PER_RUN: ${{ vars.MAX_ALERTS_PER_RUN }}
          MAX_DEAL_AGE_HOURS: ${{ vars.MAX_DEAL_AGE_HOURS }}
          USER_AGENT: ${{ vars.USER_AGENT }}
          SEEN_FILE: ${{ vars.SEEN_FILE }}
          KEYWORDS_FILE: ${{ vars.KEYWORDS_FILE }}
        run: python main.py

      - name: Save seen deals cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/seen_deals.json
          key: seen-deals-${{ github.run_id }}
